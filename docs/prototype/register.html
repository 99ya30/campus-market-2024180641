<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 校园轻集市</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding: 24px; }
    .auth-card { width: 460px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; }
    .auth-card .logo { text-align: center; font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .auth-card .subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .auth-card .form-group { margin-bottom: 18px; }
    .auth-card .form-input { padding: 10px 14px; font-size: 15px; }
    .auth-card .btn { width: 100%; padding: 12px; font-size: 15px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
    .auth-footer a { color: var(--primary); }
    .name-row { display: flex; gap: 12px; }
    .name-row .form-group { flex: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div class="auth-page">
      <div class="auth-card">
        <div class="logo">🏫 校园轻集市</div>
        <div class="subtitle">注册新账号</div>
        <form @submit.prevent>
          <div class="name-row">
            <div class="form-group">
              <label class="form-label">姓名</label>
              <input class="form-input" type="text" placeholder="真实姓名">
            </div>
            <div class="form-group">
              <label class="form-label">学号</label>
              <input class="form-input" type="text" placeholder="学号">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">学院</label>
            <el-select v-model="college" placeholder="请选择学院" style="width:100%;">
              <el-option label="计算机科学与技术学院" value="cs"></el-option>
              <el-option label="信息工程学院" value="se"></el-option>
              <el-option label="机电工程学院" value="me"></el-option>
              <el-option label="外国语学院" value="fl"></el-option>
              <el-option label="理学院" value="sc"></el-option>
            </el-select>
          </div>
          <div class="form-group">
            <label class="form-label">邮箱</label>
            <input class="form-input" type="email" placeholder="请输入学校邮箱">
          </div>
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input class="form-input" type="tel" placeholder="请输入手机号">
          </div>
          <div class="form-group">
            <label class="form-label">设置密码</label>
            <input class="form-input" type="password" placeholder="至少 8 位，字母+数字">
          </div>
          <div class="form-group">
            <label class="form-label">确认密码</label>
            <input class="form-input" type="password" placeholder="请再次输入密码">
          </div>
          <div style="margin-bottom:20px;font-size:13px;">
            <label><input type="checkbox"> 我已阅读并同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></label>
          </div>
          <a href="login.html" class="btn btn-primary btn-lg" style="display:block;text-align:center;text-decoration:none;">注 册</a>
        </form>
        <div class="auth-footer">已有账号？<a href="login.html">立即登录</a></div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({ setup() { const college = ref(''); return { college } } })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
