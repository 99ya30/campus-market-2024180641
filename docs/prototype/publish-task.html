<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布跑腿委托 - 校园轻集市</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .form-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    .form-card { background: #fff; border-radius: var(--radius-base); border: 1px solid var(--border-lighter); }
    .form-card .card-body { padding: 28px; }
    .form-card .card-body h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-lighter); }
    .form-actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-lighter); }
    .tip-card { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
    .tip-card h4 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .tip-card ul { padding-left: 16px; }
    .tip-card ul li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-container">
      <header class="site-header">
        <div class="header-inner">
          <a href="home.html" class="logo">🏫 校园轻<span>集市</span></a>
          <div class="header-search"><el-input placeholder="搜索..." v-model="search" size="large" clearable><template #prefix><el-icon><Search /></el-icon></template></el-input></div>
          <div class="header-actions">
            <a href="publish.html" class="btn btn-primary">发布</a>
            <a href="messages.html" class="btn btn-default"><el-icon><Message /></el-icon> 消息</a>
            <a href="profile.html"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80&h=80&fit=crop&crop=face" alt="" class="avatar"></a>
          </div>
        </div>
      </header>
      <div class="main-content">
        <div class="breadcrumb"><a href="home.html">首页</a><span class="sep">/</span><a href="publish.html">发布</a><span class="sep">/</span><span>发布跑腿委托</span></div>
        <h2 class="page-title">发布跑腿委托</h2>
        <div class="form-layout">
          <div class="form-card">
            <div class="card-body">
              <h3>委托信息</h3>
              <div class="form-group">
                <label class="form-label">任务标题 <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="text" placeholder="例如：求帮取快递到 6 栋宿舍" value="求帮取快递到 6 栋宿舍">
              </div>
              <div class="form-group">
                <label class="form-label">任务内容 <span style="color:#f56c6c;">*</span></label>
                <textarea class="form-textarea" placeholder="请详细描述需要跑腿的事项" rows="3">快递在北门快递站，中通快递，取件码 6-28-3047，送到 6 栋 302 宿舍放在门口即可。快递不大，鞋盒大小。</textarea>
              </div>
              <div class="form-group">
                <label class="form-label">出发地点 <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="text" placeholder="例如：北门快递站" value="北门快递站">
              </div>
              <div class="form-group">
                <label class="form-label">送达地点 <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="text" placeholder="例如：6 栋宿舍 302" value="6 栋宿舍 302">
              </div>
              <div class="form-group">
                <label class="form-label">报酬 (¥) <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="number" step="0.01" placeholder="请输入报酬金额" value="15">
              </div>
              <div class="form-group">
                <label class="form-label">期望完成时间 <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="datetime-local" value="2026-06-28T20:00">
              </div>
              <div class="form-group">
                <label class="form-label">联系方式 <span style="color:#f56c6c;">*</span></label>
                <input class="form-input" type="text" placeholder="请输入微信 / QQ / 手机号" value="WeChat: zhao2024">
              </div>
              <div class="form-actions">
                <button class="btn btn-primary btn-lg" style="flex:1;">提交发布</button>
                <button class="btn btn-default btn-lg">保存草稿</button>
              </div>
            </div>
          </div>
          <div>
            <div class="form-card tip-card">
              <div class="card-body">
                <h4>📌 发布须知</h4>
                <ul>
                  <li>合理设置报酬金额，过低可能无人接单</li>
                  <li>清晰描述任务内容和具体位置</li>
                  <li>任务完成后请及时确认并支付报酬</li>
                  <li>注意人身和财产安全，谨慎交接</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({ setup() { const search = ref(''); return { search } } })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
